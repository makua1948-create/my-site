<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テストサイト</title>
    <style>
        /* 簡単な見た目の調整（デザイン） */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #00ffcc;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #a0a0ab;
            font-size: 1.1rem;
        }
        .status {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            background-color: #22c55e;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello World!</h1>
        <p>HTMLホスティングのテストページです。</p>
        <div class="status">オンライン公開成功</div>
    </div>

</body>
</html>
