<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROSWIPE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    overflow:hidden;
    background:black; /* 動画が読み込まれるまでのベース色 */
}

/* BACKGROUND VIDEO */
#bg-video{
    position:fixed;
    right:0;
    bottom:0;

    min-width:100%;
    min-height:100%;

    width:auto;
    height:auto;

    /* 重なり順：一番奥に配置(1) */
    z-index: 1;

    object-fit:cover;
    display: block;
}

/* DARK OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    
    /* 重なり順：動画のすぐ上(2) */
    z-index: 2;
}

/* CENTER */
.center{
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    
    /* 重なり順：一番手前(3) にしてカードを見せる */
    position: relative;
    z-index: 3;
}

/* CARD */
.card{
    width:450px;

    padding:40px;

    border-radius:28px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px); /* Safari対策 */

    border:1px solid rgba(255,255,255,0.12);

    color:white;

    text-align:center;
}

/* LOGO */
.logo{
    width:140px;
    margin-bottom:30px;
}

/* SOCIAL */
.social{
    margin-top:18px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:16px;

    border-radius:18px;

    background:rgba(255,255,255,0.05);
}

.left{
    display:flex;
    align-items:center;
    gap:14px;
}

.left img{
    width:32px;
}

.text{
    text-align:left;
}

.text .title{
    font-weight:bold;
}

.text .sub{
    font-size:12px;
    opacity:.7;
}

.btn{
    color:white;
    text-decoration:none;

    padding:10px 18px;

    border-radius:12px;

    background:#7b2fff;
    transition: background 0.2s;
}

.btn:hover{
    background:#661ee0;
}

.footer{
    margin-top:30px;
    opacity:.5;
    letter-spacing:3px;
}

</style>
</head>
<body>

<video autoplay muted loop playsinline preload="auto" id="bg-video">
    <source src="https://proswaip.xyz/video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="center">

    <div class="card">

        <img src="logo.png" class="logo">

        <div class="social">

            <div class="left">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">

                <div class="text">
                    <div class="title">Discord</div>
                    <div class="sub">discord.gg/proswipe</div>
                </div>
            </div>

            <a href="https://discord.gg/proswipe"
               target="_blank"
               class="btn">
                Join
            </a>

        </div>

        <div class="social">

            <div class="left">
                <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">

                <div class="text">
                    <div class="title">TikTok</div>
                    <div class="sub">@proswipe_official</div>
                </div>
            </div>

            <a href="https://www.tiktok.com/@proswipe_official"
               target="_blank"
               class="btn">
                Open
            </a>

        </div>

        <div class="social">

            <div class="left">
                <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">

                <div class="text">
                    <div class="title">YouTube</div>
                    <div class="sub">@proswipe_software</div>
                </div>
            </div>

            <a href="https://www.youtube.com/@proswipe_software"
               target="_blank"
               class="btn">
                Watch
            </a>

        </div>

        <div class="footer">
            2026
        </div>

    </div>

</div>

</body>
</html>
